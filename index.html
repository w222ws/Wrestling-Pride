<!doctype html>
<html lang="uk" style="background-color: #18191e">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Цвет панели браузера на мобилках -->
    <meta name="theme-color" content="#18191e" />

    <title>PRIDE — Клуб вільної боротьби та єдиноборств у центрі Дніпра</title>
    <meta
      name="description"
      content="PRIDE — сучасний клуб вільної боротьби у центрі Дніпра. Тренування для дітей та дорослих, професійні тренери, розвиток характеру та сили. Записуйся на пробне тренування сьогодні!"
    />
    <link rel="canonical" href="https://pride-wrestling.com" />
    <link rel="icon" type="image/svg+xml" href="/favicon2.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PRIDE — Клуб боротьби у центрі Дніпра" />
    <meta
      property="og:description"
      content="Характер. Сила. PRIDE. Твій шлях у вільній боротьбі починається тут."
    />
    <meta
      property="og:image"
      content="https://pride-wrestling.com/og-image.jpg"
    />
    <meta property="og:site_name" content="PRIDE Wrestling" />
    <meta property="og:locale" content="uk_UA" />

    <!-- JSON-LD: Добавили openingHours для максимального ранжирования -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsClub",
        "name": "PRIDE Wrestling Dnipro",
        "url": "https://pride-wrestling.com",
        "logo": "https://pride-wrestling.com/logo.png",
        "description": "Професійний клуб вільної боротьби та єдиноборств у самому центрі Дніпра.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "вул. Успенська площа, 11",
          "addressLocality": "Дніпро",
          "addressRegion": "Дніпропетровська обл.",
          "addressCountry": "UA"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 48.4647,
          "longitude": 35.0462
        },
        "openingHours": "Mo-Su 08:00-22:00",
        "priceRange": "$$"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Исправленный линк шрифтов -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="background-color: #18191e">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
